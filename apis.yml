description: >-
  The British Columbia Data Catalogue is the official open data portal for the
  Government of British Columbia, Canada. Built on the CKAN open data platform,
  it provides programmatic access to thousands of BC government datasets spanning
  census and demographic data, environmental and climate information, geospatial
  and mapping data, financial reports, transportation and infrastructure data,
  and health and social services statistics. The CKAN API at api/3/action/ enables
  searching, listing, and retrieving dataset metadata and resources without authentication.
apis:
  - aid: british-columbia-data-catalogue:ckan-api
    name: BC Data Catalogue CKAN API
    tags:
      - CKAN
      - Open Data
      - Dataset Search
      - Metadata
      - Government Data
    humanURL: https://catalogue.data.gov.bc.ca/
    properties:
      - url: https://catalogue.data.gov.bc.ca/
        type: Documentation
      - url: https://catalogue.data.gov.bc.ca/api/3
        type: BaseURL
    description: >-
      The BC Data Catalogue exposes a CKAN v3 REST API at https://catalogue.data.gov.bc.ca/api/3/action/
      providing programmatic access to BC government open datasets. Key endpoints include
      package_list (list all datasets), package_search (search datasets by query),
      package_show (retrieve dataset metadata and resources), organization_list
      (list BC government organizations), and resource_show (retrieve specific
      data resource information). Returns JSON with success status and result payloads.
      No authentication required for read access to public datasets.
